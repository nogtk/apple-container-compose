project: demo

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: secret
    volumes:
      - "db-data:/var/lib/postgresql/data"
    networks:
      - backend

  web:
    image: nginx:latest
    depends_on:
      - db
    ports:
      - "8080:80"
    networks:
      - backend
    command:
      - nginx
      - -g
      - daemon off;

volumes:
  db-data:
    size: 2G

networks:
  backend:
    internal: false
